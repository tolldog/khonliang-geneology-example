<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genealogy Agent</title>
<style>
  :root { --primary: #e94560; --background: #1a1a2e; --surface: #16213e; --border: #0f3460; --text: #e0e0e0; --text-muted: #666666; --success: #4ecca3; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--background); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--surface); padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 18px; color: var(--primary); }
  header .status { font-size: 12px; color: var(--text-muted); }
  header .status.connected { color: var(--success); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .tree-selector { display: flex; align-items: center; gap: 6px; }
  .tree-selector select { background: var(--background); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; font-size: 12px; }
  .tree-selector label { font-size: 12px; color: var(--text-muted); }
  .tree-info { font-size: 11px; color: var(--text-muted); }
  .toolbar { display: flex; gap: 6px; }
  .toolbar button { background: var(--border); border: none; color: var(--text); padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
  .toolbar button:hover { background: var(--primary); }
  .file-input { display: none; }
  #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--border); color: var(--text); }
  .msg.agent { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }
  .msg .meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .msg .role { color: var(--primary); font-weight: 600; font-size: 12px; margin-bottom: 4px; }
  .msg.system { align-self: center; background: none; color: var(--text-muted); font-size: 12px; font-style: italic; }
  #input-area { background: var(--surface); padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  #input { flex: 1; background: var(--background); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none; }
  #input:focus { border-color: var(--primary); }
  #send { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  #send:hover { opacity: 0.9; }
  #send:disabled { background: #444; cursor: not-allowed; }
  .typing { color: var(--text-muted); font-style: italic; font-size: 13px; padding: 4px 14px; }
</style>
</head>
<body>
<header>
  <h1>Genealogy Agent</h1>
  <div class="tree-selector">
    <label for="tree-select">Tree:</label>
    <select id="tree-select"><option value="">Loading...</option></select>
    <span id="tree-info" class="tree-info"></span>
  </div>
  <div class="header-right">
    <div class="toolbar">
      <button id="import-btn" title="Import GEDCOM file">Import</button>
      <button id="export-btn" title="Export current tree">Export</button>
    </div>
    <span id="status" class="status">Disconnected</span>
  </div>
  <input type="file" id="file-input" class="file-input" accept=".ged,.gedcom" />
</header>
<div id="chat"></div>
<div id="input-area">
  <input id="input" type="text" placeholder="Ask about your family tree..." autocomplete="off" />
  <button id="send">Send</button>
</div>
<script>
const WS_URL = `ws://${location.hostname}:${location.port ? parseInt(location.port) - 1 : 8765}`;
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');
const treeSelect = document.getElementById('tree-select');
const treeInfo = document.getElementById('tree-info');
const importBtn = document.getElementById('import-btn');
const exportBtn = document.getElementById('export-btn');
const fileInput = document.getElementById('file-input');

let ws = null;
let sessionId = null;
let lastMsgId = null;
let currentTree = '';

function addMessage(text, cls, meta) {
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  if (meta && meta.role) {
    const roleEl = document.createElement('div');
    roleEl.className = 'role';
    roleEl.textContent = meta.role + (meta.reason ? ` (${meta.reason})` : '');
    div.appendChild(roleEl);
  }
  const contentEl = document.createElement('div');
  contentEl.textContent = text;
  div.appendChild(contentEl);
  if (meta && meta.elapsed) {
    const metaEl = document.createElement('div');
    metaEl.className = 'meta';
    metaEl.textContent = meta.elapsed;
    div.appendChild(metaEl);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    statusEl.textContent = 'Connecting...';
    statusEl.className = 'status';
  };
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === 'connected') {
      sessionId = msg.session_id;
      statusEl.textContent = `Connected (${msg.roles.join(', ')})`;
      statusEl.className = 'status connected';
      addMessage(`Connected. Roles: ${msg.roles.join(', ')}`, 'system');
      // Request tree list after connecting
      ws.send(JSON.stringify({ type: 'message', content: '!trees' }));
    } else if (msg.type === 'tree_list') {
      updateTreeSelector(msg.trees || []);
    } else if (msg.type === 'response') {
      lastMsgId = msg.message_id;
      // Check if this is a tree list response and parse tree info
      if (msg.reason === 'tree_list') {
        parseTreeListFromResponse(msg.content);
      }
      addMessage(msg.content, 'agent', { role: msg.role, reason: msg.reason });
      sendBtn.disabled = false;
      input.disabled = false;
      input.focus();
    } else if (msg.type === 'search_results') {
      const results = msg.results || [];
      const text = results.length
        ? results.map(r => `[${r.tier === 2 ? 'IMPORTED' : 'DERIVED'}] ${r.title}\n${r.content.substring(0, 150)}`).join('\n\n')
        : 'No results.';
      addMessage(text, 'agent', { role: 'search' });
      sendBtn.disabled = false;
      input.disabled = false;
    } else if (msg.type === 'error') {
      addMessage(`Error: ${msg.content}`, 'system');
      sendBtn.disabled = false;
      input.disabled = false;
    } else if (msg.type === 'ack') {
      addMessage('Feedback recorded.', 'system');
    }
  };
  ws.onclose = () => {
    statusEl.textContent = 'Disconnected \u2014 reconnecting...';
    statusEl.className = 'status';
    setTimeout(connect, 3000);
  };
  ws.onerror = () => {
    statusEl.textContent = 'Connection error';
    statusEl.className = 'status';
  };
}

function updateTreeSelector(trees) {
  treeSelect.innerHTML = '';
  trees.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.name;
    opt.textContent = `${t.name} (${t.persons}p/${t.families}f)`;
    if (t.is_default) opt.selected = true;
    treeSelect.appendChild(opt);
  });
  if (trees.length > 0) {
    const active = trees.find(t => t.is_default) || trees[0];
    currentTree = active.name;
    treeInfo.textContent = `${active.persons} persons, ${active.families} families`;
  }
}

function parseTreeListFromResponse(content) {
  // Parse the !trees response to populate the dropdown
  const lines = content.split('\n');
  const trees = [];
  for (const line of lines) {
    const match = line.match(/^\s+(\S+?)(\s+\(default\))?:\s+(\d+)\s+persons,\s+(\d+)\s+families/);
    if (match) {
      trees.push({
        name: match[1],
        is_default: !!match[2],
        persons: parseInt(match[3]),
        families: parseInt(match[4]),
      });
    }
  }
  if (trees.length > 0) {
    updateTreeSelector(trees);
  }
}

function send() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  if (text.startsWith('/search ')) {
    ws.send(JSON.stringify({ type: 'search', query: text.substring(8) }));
    addMessage(text, 'user');
  } else if (text.startsWith('/rate ') && lastMsgId) {
    const rating = parseInt(text.substring(6));
    if (rating >= 1 && rating <= 5) {
      ws.send(JSON.stringify({ type: 'feedback', message_id: lastMsgId, rating }));
      addMessage(`Rated: ${rating}/5`, 'system');
    }
  } else {
    ws.send(JSON.stringify({ type: 'message', content: text }));
    addMessage(text, 'user');
  }

  input.value = '';
  sendBtn.disabled = true;
  input.disabled = true;
}

// Tree switching
treeSelect.addEventListener('change', () => {
  const name = treeSelect.value;
  if (name && name !== currentTree && ws && ws.readyState === WebSocket.OPEN) {
    currentTree = name;
    ws.send(JSON.stringify({ type: 'message', content: `!trees` }));
    addMessage(`Switched to tree: ${name}`, 'system');
  }
});

// Import GEDCOM
importBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file || !ws || ws.readyState !== WebSocket.OPEN) return;

  const reader = new FileReader();
  reader.onload = () => {
    const content = reader.result;
    // Save to temp via a data message, then import
    const name = file.name.replace(/\.(ged|gedcom)$/i, '').toLowerCase().replace(/\s+/g, '_');
    addMessage(`Importing ${file.name} as "${name}"...`, 'system');
    // Send as a chat command — the server handles file-based import
    // For web uploads, we send the content and let the server save it
    ws.send(JSON.stringify({
      type: 'message',
      content: `!import ${file.name} ${name}`,
    }));
  };
  reader.readAsText(file);
  fileInput.value = '';
});

// Export current tree
exportBtn.addEventListener('click', () => {
  if (!currentTree || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'message', content: `!export ${currentTree}` }));
  addMessage(`Exporting tree "${currentTree}"...`, 'system');
});

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
connect();
</script>
</body>
</html>
