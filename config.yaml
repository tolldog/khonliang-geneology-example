# Genealogy Agent Configuration

server:
  host: "0.0.0.0"
  ws_port: 8765
  web_port: 8766

app:
  title: "Genealogy Agent"
  gedcom: "data/Toll Family Tree.ged"
  gedcoms: {}                              # name: path pairs for multi-tree
  knowledge_db: "data/knowledge.db"

ollama:
  url: "http://localhost:11434"
  models:
    researcher: "llama3.2:3b"
    fact_checker: "qwen2.5:7b"
    narrator: "llama3.1:8b"
    match_agent: "qwen2.5:7b"

matching:
  auto_scan: false
  min_heuristic_score: 0.6
  min_agent_confidence: 0.75
  max_scan_results: 50

personalities:
  enabled: true

consensus:
  enabled: true
  timeout: 30
  debate_enabled: true
  debate_rounds: 2
  disagreement_threshold: 0.6

training:
  feedback_enabled: true
  heuristics_enabled: true

reports:
  enabled: true
  port: 5050
  db: "data/reports.db"

theme:
  primary: "#e94560"
  background: "#1a1a2e"
  surface: "#16213e"
  border: "#0f3460"
  text: "#e0e0e0"
  text_muted: "#666666"
  success: "#4ecca3"
